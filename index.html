<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Weblinka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#14161A; --surface:#1C1F26; --surface-2:#262A33; --border:#333844;
    --text:#ECEDEF; --text-dim:#9AA0AC;
    --accent:#FF6B35; --accent-dim:#CC5629;
    --ok:#3DDC84; --warn:#FFB020; --danger:#FF4D4D;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:78px;}
  header.topbar{position:sticky;top:0;z-index:10;background:rgba(20,22,26,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;}
  header.topbar h1{font-size:17px;margin:0;font-weight:600;letter-spacing:.2px;}
  header.topbar .sub{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;}
  main{flex:1;padding:16px;}
  nav.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(28,31,38,.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;max-width:520px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom);}
  nav.bottom button{flex:1;background:none;border:none;color:var(--text-dim);padding:12px 4px 10px;font-family:inherit;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:color .15s;}
  nav.bottom button.active{color:var(--accent);}
  nav.bottom button svg{width:20px;height:20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px 18px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;width:100%;transition:background .15s,transform .1s;}
  .btn:active{transform:scale(.98);}
  .btn:hover{background:var(--accent-dim);}
  .btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
  .btn.small{width:auto;padding:9px 14px;font-size:13px;}
  input,select{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:11px 12px;font-family:inherit;font-size:14px;margin-bottom:10px;}
  input:focus,select:focus{outline:none;border-color:var(--accent);}
  label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:5px;font-family:'IBM Plex Mono',monospace;}
  .row{display:flex;gap:10px;}
  .row>*{flex:1;}
  .badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;}
  .badge.ok{background:rgba(61,220,132,.15);color:var(--ok);}
  .badge.warn{background:rgba(255,176,32,.15);color:var(--warn);}
  .badge.danger{background:rgba(255,77,77,.15);color:var(--danger);}
  .product-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;}
  .product-row:last-child{border-bottom:none;}
  .product-row .name{font-weight:500;font-size:14px;}
  .product-row .meta{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
  .stat{font-family:'IBM Plex Mono',monospace;font-size:13px;text-align:right;}
  .empty{text-align:center;color:var(--text-dim);padding:40px 20px;font-size:13px;}
  .empty svg{width:40px;height:40px;opacity:.4;margin-bottom:10px;}
  /* scanner */
  #reader{width:100%;border-radius:var(--radius);overflow:hidden;background:#000;position:relative;}
  .scan-frame{position:relative;}
  .scan-hint{text-align:center;color:var(--text-dim);font-size:12px;margin-top:12px;font-family:'IBM Plex Mono',monospace;}
  .laser{position:absolute;left:8%;right:8%;top:50%;height:2px;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:sweep 1.8s ease-in-out infinite;pointer-events:none;z-index:5;}
  @keyframes sweep{0%,100%{top:30%;}50%{top:70%;}}
  .corner{position:absolute;width:26px;height:26px;border-color:var(--accent);z-index:5;pointer-events:none;}
  .corner.tl{top:8%;left:8%;border-top:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:6px 0 0 0;}
  .corner.tr{top:8%;right:8%;border-top:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 6px 0 0;}
  .corner.bl{bottom:8%;left:8%;border-bottom:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:0 0 0 6px;}
  .corner.br{bottom:8%;right:8%;border-bottom:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 0 6px 0;}
  .missing-big{font-family:'IBM Plex Mono',monospace;font-size:34px;font-weight:600;color:var(--warn);}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border);padding:10px 16px;border-radius:10px;font-size:13px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.4);}
  .link{color:var(--accent);background:none;border:none;font-family:inherit;font-size:13px;cursor:pointer;padding:0;}
  .section-title{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;font-family:'IBM Plex Mono',monospace;margin:4px 0 10px;}
  .config-warn{background:rgba(255,176,32,.1);border:1px solid var(--warn);color:var(--warn);border-radius:10px;padding:14px;font-size:13px;line-height:1.5;margin:16px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ==========================================================
// KONFIGURACJA — uzupełnij po utworzeniu projektu Supabase
// ==========================================================
const SUPABASE_URL = "https://xjwbofgfdwivomvlppfm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhqd2JvZmdmZHdpdm9tdmxwcGZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNzIzMjcsImV4cCI6MjA5NjY0ODMyN30._7cZ6Pg2i8NrgxO2YqbxWNytWoqJUOfpwtxct911ycc";
// ==========================================================

let sb = null;
let session = null;
let state = { tab: 'scan', products: [], categories: [], locations: [], scannerRunning: false, scannedProduct: null, scannedBarcode: null };

const app = document.getElementById('app');

function configured(){
  return SUPABASE_URL && !SUPABASE_URL.startsWith('TU_') && SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith('TU_');
}

function icon(name){
  const icons = {
    scan: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 12h10"/></svg>',
    list: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>',
    alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
    box: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>'
  };
  return icons[name] || '';
}

function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

function status(p){
  if (p.current_stock <= 0) return 'danger';
  if (p.current_stock < p.shelf_target) return 'warn';
  return 'ok';
}

// ---------------- BOOT ----------------
async function boot(){
  if (!configured()){
    renderNotConfigured();
    return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data } = await sb.auth.getSession();
  session = data.session;
  sb.auth.onAuthStateChange((_e, s)=>{ session = s; render(); });
  if (session){ await loadAll(); }
  render();
}

function renderNotConfigured(){
  app.innerHTML = `
    <header class="topbar"><h1>Weblinka</h1></header>
    <div class="config-warn">
      <strong>Appka jeszcze nie jest podłączona do bazy danych.</strong><br><br>
      Uzupełnij <span class="mono">SUPABASE_URL</span> i <span class="mono">SUPABASE_ANON_KEY</span>
      na górze pliku po utworzeniu projektu Supabase, i uruchom plik <span class="mono">schema.sql</span>
      w SQL Editorze tego projektu.
    </div>`;
}

async function loadAll(){
  const [{data:products}, {data:categories}, {data:locations}] = await Promise.all([
    sb.from('products').select('*').order('name'),
    sb.from('categories').select('*').order('name'),
    sb.from('locations').select('*').order('name'),
  ]);
  state.products = products || [];
  state.categories = categories || [];
  state.locations = locations || [];
}

function catName(id){ return state.categories.find(c=>c.id===id)?.name || '—'; }
function locName(id){ return state.locations.find(l=>l.id===id)?.name || '—'; }

// ---------------- RENDER SHELL ----------------
function render(){
  if (!session){ renderLogin(); return; }
  app.innerHTML = `
    <header class="topbar">
      <div><h1>Weblinka</h1><div class="sub">${escapeHtml(session.user.email)}</div></div>
      <button class="link" onclick="logout()">Wyloguj</button>
    </header>
    <main id="main"></main>
    <nav class="bottom">
      ${navBtn('scan','Uzupełnij półkę')}
      ${navBtn('list','Stan')}
      ${navBtn('alert','Braki')}
      ${navBtn('settings','Ustawienia')}
    </nav>
  `;
  renderTab();
}

function navBtn(tab,label){
  const active = state.tab===tab ? 'active' : '';
  return `<button class="${active}" onclick="setTab('${tab}')">${icon(tab)}<span>${label}</span></button>`;
}

function setTab(tab){
  stopScanner();
  state.tab = tab;
  state.scannedProduct = null;
  state.scannedBarcode = null;
  render();
}

function renderTab(){
  const main = document.getElementById('main');
  if (state.tab==='scan') renderScan(main);
  else if (state.tab==='list') renderList(main);
  else if (state.tab==='alert') renderAlerts(main);
  else if (state.tab==='settings') renderSettings(main);
}

// ---------------- LOGIN ----------------
function renderLogin(){
  app.innerHTML = `
    <div style="max-width:340px;margin:80px auto;padding:0 20px;">
      <h1 style="text-align:center;margin-bottom:4px;">Weblinka</h1>
      <div style="text-align:center;color:var(--text-dim);font-size:12px;font-family:'IBM Plex Mono',monospace;margin-bottom:24px;">system Wędlinki</div>
      <div class="card">
        <label>E-mail</label>
        <input id="login-email" type="email" placeholder="ty@przyklad.pl">
        <label>Hasło</label>
        <input id="login-pass" type="password" placeholder="••••••••">
        <button class="btn" onclick="login()">Zaloguj się</button>
        <div id="login-err" style="color:var(--danger);font-size:12px;margin-top:10px;"></div>
      </div>
    </div>`;
}

async function login(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-pass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error){ document.getElementById('login-err').textContent = 'Błędny e-mail lub hasło.'; return; }
  await loadAll();
  render();
}

async function logout(){
  await sb.auth.signOut();
  render();
}

// ---------------- SCAN TAB ----------------
let html5Qr = null;

function renderScan(main){
  if (state.scannedProduct !== null || state.scannedBarcode){
    renderScanResult(main);
    return;
  }
  main.innerHTML = `
    <div class="scan-frame">
      <div id="reader"></div>
      <div class="laser"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <div class="scan-hint">Wyceluj w kod kreskowy produktu na półce</div>
    <div style="margin-top:14px;">
      <button class="btn secondary" onclick="manualBarcode()">Wpisz kod ręcznie</button>
    </div>
  `;
  startScanner();
}

function startScanner(){
  if (state.scannerRunning) return;
  html5Qr = new Html5Qrcode("reader");
  html5Qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 150 } },
    (decodedText)=>{ onBarcode(decodedText); },
    ()=>{}
  ).then(()=>{ state.scannerRunning = true; }).catch(()=>{
    document.getElementById('reader').innerHTML = '<div class="empty">Brak dostępu do kamery. Sprawdź uprawnienia przeglądarki lub wpisz kod ręcznie.</div>';
  });
}

function stopScanner(){
  if (html5Qr && state.scannerRunning){
    html5Qr.stop().then(()=>html5Qr.clear()).catch(()=>{});
    state.scannerRunning = false;
  }
}

function manualBarcode(){
  const code = prompt('Wpisz kod kreskowy:');
  if (code) onBarcode(code.trim());
}

async function onBarcode(code){
  stopScanner();
  const existing = state.products.find(p => p.barcode === code);
  state.scannedBarcode = code;
  state.scannedProduct = existing || false; // false = nie znaleziono
  renderTab();
}

function renderScanResult(main){
  const code = state.scannedBarcode;
  const p = state.scannedProduct;

  if (p){
    const missing = Math.max(p.shelf_target - p.current_stock, 0);
    main.innerHTML = `
      <div class="card">
        <div class="section-title">Zeskanowano</div>
        <div style="font-size:18px;font-weight:600;margin-bottom:2px;">${escapeHtml(p.name)}</div>
        <div class="mono" style="font-size:12px;color:var(--text-dim);margin-bottom:14px;">${escapeHtml(code)} · ${catName(p.category_id)} · ${locName(p.location_id)}</div>

        <label>Ile jest teraz na półce?</label>
        <input id="count-input" type="number" min="0" inputmode="numeric" value="${p.current_stock}">
        <label>Ile powinno być na półce (cel)</label>
        <input id="target-input" type="number" min="0" inputmode="numeric" value="${p.shelf_target}">

        <div id="missing-preview" style="text-align:center;margin:14px 0;">
          <div class="missing-big">${missing}</div>
          <div class="scan-hint" style="margin-top:0;">brakuje sztuk</div>
        </div>

        <button class="btn" onclick="saveCount('${p.id}')">Zapisz</button>
        <button class="btn secondary" style="margin-top:8px;" onclick="rescan()">Skanuj kolejny</button>
      </div>`;
    const upd = ()=>{
      const c = parseInt(document.getElementById('count-input').value)||0;
      const t = parseInt(document.getElementById('target-input').value)||0;
      document.querySelector('.missing-big').textContent = Math.max(t-c,0);
    };
    document.getElementById('count-input').addEventListener('input', upd);
    document.getElementById('target-input').addEventListener('input', upd);
  } else {
    const catOpts = state.categories.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
    const locOpts = state.locations.map(l=>`<option value="${l.id}">${escapeHtml(l.name)}</option>`).join('');
    main.innerHTML = `
      <div class="card">
        <div class="section-title">Nowy produkt</div>
        <div class="mono" style="font-size:12px;color:var(--text-dim);margin-bottom:14px;">Kod: ${escapeHtml(code)}</div>

        <label>Nazwa produktu</label>
        <input id="new-name" placeholder="np. Coca-Cola 500ml">
        <label>Kategoria</label>
        <select id="new-cat"><option value="">— brak —</option>${catOpts}</select>
        <label>Lokalizacja</label>
        <select id="new-loc"><option value="">— brak —</option>${locOpts}</select>
        <div class="row">
          <div>
            <label>Ile jest teraz</label>
            <input id="new-count" type="number" min="0" value="0">
          </div>
          <div>
            <label>Ile powinno być (cel)</label>
            <input id="new-target" type="number" min="0" value="0">
          </div>
        </div>
        <button class="btn" onclick="saveNewProduct('${code}')">Dodaj produkt</button>
        <button class="btn secondary" style="margin-top:8px;" onclick="rescan()">Anuluj</button>
      </div>`;
    autoFillFromOpenFoodFacts(code);
  }
}

function rescan(){
  state.scannedProduct = null;
  state.scannedBarcode = null;
  renderTab();
}

async function saveCount(productId){
  const count = parseInt(document.getElementById('count-input').value)||0;
  const target = parseInt(document.getElementById('target-input').value)||0;
  await sb.from('products').update({ current_stock: count, shelf_target: target }).eq('id', productId);
  await sb.from('stock_checks').insert({ product_id: productId, counted_stock: count, target_stock: target });
  await loadAll();
  toast('Zapisano');
  rescan();
}

async function autoFillFromOpenFoodFacts(barcode){
  const nameInput = document.getElementById('new-name');
  if (!nameInput) return;
  nameInput.placeholder = 'Szukam w bazie produktów…';
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(barcode)}.json?fields=product_name,brands`);
    const data = await res.json();
    const input = document.getElementById('new-name'); // re-check, tab may have changed
    if (!input) return;
    if (data.status === 1 && data.product && data.product.product_name){
      const brand = data.product.brands ? data.product.brands.split(',')[0].trim() : '';
      input.value = brand ? `${data.product.product_name} (${brand})` : data.product.product_name;
      input.placeholder = 'np. Coca-Cola 500ml';
      toast('Znaleziono w Open Food Facts');
    } else {
      input.placeholder = 'np. Coca-Cola 500ml (nie znaleziono w bazie)';
    }
  } catch (e){
    const input = document.getElementById('new-name');
    if (input) input.placeholder = 'np. Coca-Cola 500ml';
  }
}

async function saveNewProduct(barcode){
  const name = document.getElementById('new-name').value.trim();
  if (!name){ toast('Podaj nazwę produktu'); return; }
  const category_id = document.getElementById('new-cat').value || null;
  const location_id = document.getElementById('new-loc').value || null;
  const current_stock = parseInt(document.getElementById('new-count').value)||0;
  const shelf_target = parseInt(document.getElementById('new-target').value)||0;
  const { data, error } = await sb.from('products').insert({ barcode, name, category_id, location_id, current_stock, shelf_target }).select().single();
  if (error){ toast('Błąd: ' + error.message); return; }
  await sb.from('stock_checks').insert({ product_id: data.id, counted_stock: current_stock, target_stock: shelf_target });
  await loadAll();
  toast('Dodano produkt');
  rescan();
}

// ---------------- LIST TAB ----------------
function renderList(main){
  const rows = state.products.map(p=>{
    const s = status(p);
    return `<div class="product-row" onclick="editProduct('${p.id}')">
      <div>
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="meta">${catName(p.category_id)} · ${locName(p.location_id)}</div>
      </div>
      <div class="stat">
        <span class="badge ${s}">${p.current_stock}/${p.shelf_target}</span>
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `
    <input id="search" placeholder="Szukaj produktu…" oninput="filterList(this.value)">
    <div class="card" id="list-wrap">
      ${state.products.length ? rows : emptyState('box','Brak produktów. Zeskanuj pierwszy towar.')}
    </div>`;
}

function filterList(q){
  q = q.toLowerCase();
  const filtered = state.products.filter(p => p.name.toLowerCase().includes(q) || p.barcode.includes(q));
  const wrap = document.getElementById('list-wrap');
  wrap.innerHTML = filtered.map(p=>{
    const s = status(p);
    return `<div class="product-row" onclick="editProduct('${p.id}')">
      <div><div class="name">${escapeHtml(p.name)}</div><div class="meta">${catName(p.category_id)} · ${locName(p.location_id)}</div></div>
      <div class="stat"><span class="badge ${s}">${p.current_stock}/${p.shelf_target}</span></div>
    </div>`;
  }).join('') || emptyState('box','Nic nie znaleziono.');
}

function editProduct(id){
  const p = state.products.find(x=>x.id===id);
  state.scannedProduct = p;
  state.scannedBarcode = p.barcode;
  state.tab = 'scan';
  render();
}

// ---------------- ALERTS TAB ----------------
function renderAlerts(main){
  const short = state.products
    .filter(p => p.current_stock < p.shelf_target)
    .sort((a,b) => (b.shelf_target-b.current_stock) - (a.shelf_target-a.current_stock));

  if (!short.length){
    main.innerHTML = emptyState('alert','Brak braków — wszystko zgodne z celem 🎉');
    return;
  }

  const rows = short.map(p=>`
    <div class="product-row">
      <div><div class="name">${escapeHtml(p.name)}</div><div class="meta">${catName(p.category_id)} · ${locName(p.location_id)}</div></div>
      <div class="stat"><span class="badge ${status(p)}">brakuje ${p.shelf_target-p.current_stock}</span></div>
    </div>`).join('');

  main.innerHTML = `
    <div class="card">${rows}</div>
    <button class="btn" onclick="exportShortages()">Eksportuj listę do Excela</button>
  `;
}

function exportShortages(){
  const short = state.products.filter(p => p.current_stock < p.shelf_target);
  const rows = short.map(p => ({
    'Nazwa': p.name,
    'Kod kreskowy': p.barcode,
    'Kategoria': catName(p.category_id),
    'Lokalizacja': locName(p.location_id),
    'Stan': p.current_stock,
    'Cel': p.shelf_target,
    'Brakuje': p.shelf_target - p.current_stock,
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Braki');
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `braki_${date}.xlsx`);
}

// ---------------- SETTINGS TAB ----------------
function renderSettings(main){
  main.innerHTML = `
    <div class="card">
      <div class="section-title">Kategorie</div>
      ${state.categories.map(c=>`<div class="product-row"><div class="name">${escapeHtml(c.name)}</div><button class="link" onclick="deleteCategory('${c.id}')">Usuń</button></div>`).join('') || '<div class="scan-hint">Brak kategorii</div>'}
      <div class="row" style="margin-top:12px;">
        <input id="new-cat-name" placeholder="Nowa kategoria">
        <button class="btn small" onclick="addCategory()">Dodaj</button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Lokalizacje</div>
      ${state.locations.map(l=>`<div class="product-row"><div class="name">${escapeHtml(l.name)}</div><button class="link" onclick="deleteLocation('${l.id}')">Usuń</button></div>`).join('') || '<div class="scan-hint">Brak lokalizacji</div>'}
      <div class="row" style="margin-top:12px;">
        <input id="new-loc-name" placeholder="Nowa lokalizacja">
        <button class="btn small" onclick="addLocation()">Dodaj</button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Eksport pełnego stanu</div>
      <button class="btn secondary" onclick="exportAll()">Eksportuj cały stan do Excela</button>
    </div>
  `;
}

async function addCategory(){
  const name = document.getElementById('new-cat-name').value.trim();
  if (!name) return;
  await sb.from('categories').insert({ name });
  await loadAll(); renderTab();
}
async function deleteCategory(id){
  await sb.from('categories').delete().eq('id', id);
  await loadAll(); renderTab();
}
async function addLocation(){
  const name = document.getElementById('new-loc-name').value.trim();
  if (!name) return;
  await sb.from('locations').insert({ name });
  await loadAll(); renderTab();
}
async function deleteLocation(id){
  await sb.from('locations').delete().eq('id', id);
  await loadAll(); renderTab();
}

function exportAll(){
  const rows = state.products.map(p => ({
    'Nazwa': p.name, 'Kod kreskowy': p.barcode, 'Kategoria': catName(p.category_id),
    'Lokalizacja': locName(p.location_id), 'Stan': p.current_stock, 'Cel': p.shelf_target,
    'Różnica': p.shelf_target - p.current_stock,
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Stan magazynowy');
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `stan_magazynowy_${date}.xlsx`);
}

// ---------------- helpers ----------------
function emptyState(iconName, text){
  return `<div class="empty">${icon(iconName)}<div>${text}</div></div>`;
}
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

boot();
</script>
</body>
</html>
