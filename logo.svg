<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="paperGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#F7EBD2"/>
      <stop offset="100%" stop-color="#E4CE9E"/>
    </radialGradient>
    <linearGradient id="sausageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D98B3F"/>
      <stop offset="55%" stop-color="#8C3823"/>
      <stop offset="100%" stop-color="#5E2216"/>
    </linearGradient>
    <path id="topArc" d="M74.4,127.5 A145,145 0 0 1 325.6,127.5" fill="none"/>
  </defs>

  <!-- stamp rings -->
  <circle cx="200" cy="200" r="192" fill="none" stroke="#C9A227" stroke-width="3" stroke-dasharray="2 5" stroke-linecap="round"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#2B2119" stroke-width="2"/>
  <circle cx="200" cy="200" r="172" fill="url(#paperGrad)"/>

  <!-- kiełbasa wiejska ring -->
  <path d="M153.5,299.7 A110,110 0 1 1 246.5,299.7" fill="none" stroke="url(#sausageGrad)" stroke-width="44" stroke-linecap="round"/>
  <path d="M113.4,150 A100,100 0 0 1 286.6,150" fill="none" stroke="#F3B978" stroke-width="12" stroke-linecap="round" opacity="0.55"/>

  <!-- twine tie -->
  <g>
    <ellipse cx="200" cy="303" rx="16" ry="9" fill="#6E4A2E"/>
    <line x1="188" y1="296" x2="212" y2="310" stroke="#6E4A2E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="212" y1="296" x2="188" y2="310" stroke="#6E4A2E" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- wordmark, arced like a stamp -->
  <text font-family="Georgia, 'Iowan Old Style', serif" font-weight="700" font-size="36" fill="#2B2119" text-anchor="middle" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%">WEBLINKA</textPath>
  </text>
</svg>
